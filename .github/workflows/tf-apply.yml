##
## Reusable workflow: Terraform Apply
## Called by consuming repositories via:
##   uses: your-org/infra-modules/.github/workflows/tf-apply.yml@main
##
## Runs plan then apply. Requires a GitHub Environment with protection rules
## for prod (manual approval gate).
##

name: Terraform Apply

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the Terraform root module"
        type: string
        required: true
      environment:
        description: "Deployment environment (dev | qa | prod)"
        type: string
        required: true
      aws_region:
        description: "AWS region to deploy into"
        type: string
        default: "us-east-1"
      terraform_version:
        description: "Terraform CLI version to use"
        type: string
        default: "1.9.0"
      backend_config_file:
        description: "Relative path to backend config HCL"
        type: string
        default: ""
      var_file:
        description: "Relative path to tfvars file"
        type: string
        default: ""
      auto_approve:
        description: "Skip interactive approval (true for non-prod automation)"
        type: boolean
        default: false
    secrets:
      aws_role_arn:
        description: "IAM role ARN to assume via OIDC"
        required: true
    outputs:
      apply_outcome:
        description: "Result of the apply step (success | failure)"
        value: ${{ jobs.apply.outputs.apply_outcome }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  apply:
    name: Apply · ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # triggers GitHub Environment protection rules
    outputs:
      apply_outcome: ${{ steps.apply.outcome }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: tf-apply-${{ inputs.environment }}-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform init
        run: |
          INIT_ARGS=""
          if [ -n "${{ inputs.backend_config_file }}" ]; then
            INIT_ARGS="-backend-config=${{ github.workspace }}/${{ inputs.backend_config_file }}"
          fi
          terraform init -input=false $INIT_ARGS

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: |
          VAR_FILE_ARG=""
          if [ -n "${{ inputs.var_file }}" ]; then
            VAR_FILE_ARG="-var-file=${{ github.workspace }}/${{ inputs.var_file }}"
          fi
          terraform plan -input=false -no-color -out=tfplan $VAR_FILE_ARG

      - name: Terraform apply
        id: apply
        run: terraform apply -input=false -no-color -auto-approve tfplan 2>&1 | tee apply_output.txt

      - name: Post apply summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const applyOutput = fs.existsSync('${{ inputs.working_directory }}/apply_output.txt')
              ? fs.readFileSync('${{ inputs.working_directory }}/apply_output.txt', 'utf8')
              : '(no output)';
            const truncated = applyOutput.length > 30000
              ? applyOutput.substring(0, 30000) + '\n\n... (truncated)'
              : applyOutput;

            const icon = '${{ steps.apply.outcome }}' === 'success' ? '✅' : '❌';

            await core.summary
              .addHeading(`${icon} Terraform Apply · \`${{ inputs.environment }}\` · \`${{ inputs.working_directory }}\``)
              .addCodeBlock(truncated, 'hcl')
              .addRaw(`*Actor: @${{ github.actor }} · Run [${context.runId}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`)
              .write();

      - name: Fail build on apply error
        if: steps.apply.outcome == 'failure'
        run: exit 1
