##
## Reusable workflow: Terraform Plan
## Called by consuming repositories via:
##   uses: your-org/infra-modules/.github/workflows/tf-plan.yml@main
##
## Triggers: pull_request events in the calling repo, or manual dispatch.
## Posts a formatted plan summary as a PR comment.
##

name: Terraform Plan

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the Terraform root module (e.g. stacks/bff)"
        type: string
        required: true
      environment:
        description: "Deployment environment (dev | qa | prod)"
        type: string
        required: true
      aws_region:
        description: "AWS region to deploy into"
        type: string
        default: "us-east-1"
      terraform_version:
        description: "Terraform CLI version to use"
        type: string
        default: "1.9.0"
      backend_config_file:
        description: "Relative path to backend config HCL (e.g. config/backend-dev.hcl)"
        type: string
        default: ""
      var_file:
        description: "Relative path to tfvars file (e.g. environments/dev/terraform.tfvars)"
        type: string
        default: ""
    secrets:
      aws_role_arn:
        description: "IAM role ARN to assume via OIDC for this environment"
        required: true

permissions:
  id-token: write        # OIDC token for AWS auth
  contents: read
  pull-requests: write   # post plan comments

jobs:
  plan:
    name: Plan · ${{ inputs.environment }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: tf-plan-${{ inputs.environment }}-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        id: init
        run: |
          INIT_ARGS=""
          if [ -n "${{ inputs.backend_config_file }}" ]; then
            INIT_ARGS="-backend-config=${{ github.workspace }}/${{ inputs.backend_config_file }}"
          fi
          terraform init -input=false $INIT_ARGS

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: |
          VAR_FILE_ARG=""
          if [ -n "${{ inputs.var_file }}" ]; then
            VAR_FILE_ARG="-var-file=${{ github.workspace }}/${{ inputs.var_file }}"
          fi
          terraform plan -input=false -no-color -out=tfplan $VAR_FILE_ARG 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.existsSync('${{ inputs.working_directory }}/plan_output.txt')
              ? fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8')
              : '(no plan output)';

            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (truncated)'
              : planOutput;

            const fmtStatus  = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '⚠️';
            const initStatus = '${{ steps.init.outcome }}' === 'success' ? '✅' : '❌';
            const valStatus  = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const body = [
              `## Terraform Plan · \`${{ inputs.environment }}\` · \`${{ inputs.working_directory }}\``,
              '',
              `| Step | Status |`,
              `|------|--------|`,
              `| fmt  | ${fmtStatus} |`,
              `| init | ${initStatus} |`,
              `| validate | ${valStatus} |`,
              `| plan | ${planStatus} |`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              `*Triggered by @${{ github.actor }} · Run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `<!-- tf-plan-${{ inputs.environment }}-${{ inputs.working_directory }} -->`;
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: marker + '\n' + body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5
